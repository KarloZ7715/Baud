name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shell-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate desktop entry source
        run: desktop-file-validate assets/packaging/baud.desktop
      - name: Run release asset fixture suite
        run: bash tools/ci/test_release_assets.sh
      - name: Run installer fixture suite
        run: bash tools/ci/test_install_release.sh
