name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1: checks basicos (los mas baratos, corren primero)
  checks:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Verificar formato
        run: cargo fmt --all -- --check

      - name: Clippy (sin warnings)
        run: cargo clippy --all-targets -- -D warnings

  # Job 2: tests (corre en paralelo con checks, pero depende de que el repo se descarge)
  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Correr tests
        run: cargo test --all --verbose

  # Job 3: build de release (verifica que compila optimizado)
  build:
    name: build release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Compilar en release
        run: cargo build --release --locked

  # Job 4: gate de compile en Windows (required). La matriz runtime Windows queda diferida.
  windows-compile:
    name: windows compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo check (Windows)
        run: cargo check --all-targets

      - name: cargo build (Windows)
        run: cargo build --locked

  # Job 5: smoke X11 bajo xvfb. NO cubre Wayland ni compositors reales.
  # Ver docs/standards/linux-session-matrix.md. allow-fail hasta estabilizar.
  xvfb-smoke:
    name: xvfb X11 smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Instalar xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Smoke X11 (sin Wayland)
        env:
          WAYLAND_DISPLAY: ""
          WAYLAND_SOCKET: ""
        run: |
          unset WAYLAND_DISPLAY WAYLAND_SOCKET || true
          chmod +x tools/linux_session_smoke.sh
          tools/linux_session_smoke.sh --xvfb --build
