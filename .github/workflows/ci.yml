name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1: checks basicos (los mas baratos, corren primero)
  checks:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Verificar formato
        run: cargo fmt --all -- --check

      - name: Clippy (sin warnings)
        run: cargo clippy --all-targets -- -D warnings

  # Job 2: tests (corre en paralelo con checks, pero depende de que el repo se descarge)
  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Correr tests
        run: cargo test --all --verbose

  # Job 3: build de release (verifica que compila optimizado)
  build:
    name: build release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Compilar en release
        run: cargo build --release --locked

  # Job 4: gate de compile en Windows (required). La matriz runtime Windows queda diferida.
  windows-compile:
    name: windows compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo check (Windows)
        run: cargo check --all-targets

      - name: cargo build (Windows)
        run: cargo build --locked

  # Job 5: gate blando de runtime ConPTY en Windows. Headless, sin winit.
  # Soft gate: continue-on-error hasta la ventana de estabilidad.
  windows-conpty:
    name: windows-conpty
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Tests de sesión ConPTY (headless)
        shell: pwsh
        run: |
          $maxIntentos = 2
          $codigo = 1
          for ($intento = 1; $intento -le $maxIntentos; $intento++) {
            Write-Host "Intento ${intento} de ${maxIntentos}"
            cargo test --test pty_session_conformance -- --test-threads=1 --nocapture
            $codigo = $LASTEXITCODE
            if ($codigo -eq 0) { break }
            if ($intento -lt $maxIntentos) {
              Write-Host "Reintentando tras fallo (intento ${intento})..."
              Start-Sleep -Seconds 5
            }
          }
          if ($codigo -ne 0) {
            Write-Host "Los tests de sesión ConPTY fallaron tras ${maxIntentos} intentos"
          }
          exit $codigo

  # Job 6: smoke X11 bajo xvfb. NO cubre Wayland ni compositors reales.
  xvfb-smoke:
    name: xvfb X11 smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Instalar xvfb + deps X11
        run: sudo apt-get update && sudo apt-get install -y xvfb libxkbcommon-x11-0

      - name: Smoke X11 (sin Wayland)
        env:
          WAYLAND_DISPLAY: ""
          WAYLAND_SOCKET: ""
        run: |
          unset WAYLAND_DISPLAY WAYLAND_SOCKET || true
          chmod +x tools/linux_session_smoke.sh
          tools/linux_session_smoke.sh --xvfb --build
