name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1: checks basicos (los mas baratos, corren primero)
  checks:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Verificar formato
        run: cargo fmt --all -- --check

      - name: Clippy (sin warnings)
        run: cargo clippy --all-targets -- -D warnings

  # Job 2: tests (corre en paralelo con checks, pero depende de que el repo se descarge)
  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Correr tests
        run: cargo test --all --verbose

  # Job 3: build de release (verifica que compila optimizado)
  build:
    name: build release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Compilar en release
        run: cargo build --release --locked

  # Job 4: matriz para validar que anda en multiples OS (Fase 0 = solo Linux, pero listo para crecer)
