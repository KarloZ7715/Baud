name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  APPIMAGE_EXTRACT_AND_RUN: "1"

jobs:
  license-gate:
    name: verificación de licencia
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar que LICENSE existe
        run: test -f LICENSE

      - name: Verificar campo license en Cargo.toml
        run: grep -qE '^license\s*=\s*"Apache-2\.0"' Cargo.toml

  linux-packages:
    name: paquetes Linux (AppImage, deb, rpm)
    runs-on: ubuntu-22.04
    needs: license-gate
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cachear target/
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Instalar dependencias de compilación
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libvulkan-dev \
            libfontconfig1-dev

      - name: Compilar en release
        run: cargo build --release --locked

      - name: Instalar cargo-deb
        run: cargo install cargo-deb --locked

      - name: Construir .deb
        run: ./tools/packaging/build_deb.sh

      - name: Instalar cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Construir .rpm
        run: ./tools/packaging/build_rpm.sh

      - name: Construir AppImage
        run: ./tools/packaging/build_appimage.sh

      - name: Construir tarball (binario)
        run: ./tools/packaging/build_tarball.sh

      - name: Verificar contenido del .deb
        run: |
          for deb in dist/*.deb; do
            echo "=== $deb ==="
            dpkg-deb -c "$deb" | grep -E '(baud|desktop|png)'
          done

      - name: Generar SHA256SUMS
        run: |
          cd dist
          sha256sum *.AppImage *.deb *.rpm *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Subir artefactos (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: baud-linux-packages
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Crear GitHub Release y subir artefactos (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
