name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  APPIMAGE_EXTRACT_AND_RUN: "1"

permissions:
  contents: read

jobs:
  license-gate:
    name: License gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify LICENSE exists
        run: test -f LICENSE

      - name: Verify Cargo license field
        run: grep -qE '^license\s*=\s*"Apache-2\.0"' Cargo.toml

  prepare-release:
    name: Prepare release draft
    runs-on: ubuntu-latest
    needs: license-gate
    permissions:
      contents: write
    outputs:
      publish: ${{ steps.mode.outputs.publish }}
      tag: ${{ steps.mode.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Select release mode
        id: mode
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: releases must use normal vX.Y.Z tags" >&2
            exit 1
          fi

          version="$(sed -nE 's/^version = "([^"]+)"$/\1/p' Cargo.toml | head -n1)"
          if [[ "$tag" != "v$version" ]]; then
            echo "Error: tag $tag does not match Cargo.toml version $version" >&2
            exit 1
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create or validate draft release
        if: steps.mode.outputs.publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.mode.outputs.tag }}
        run: |
          set -Eeuo pipefail
          if gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
            exit 0
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Error: release $TAG already exists and is not a draft" >&2
            exit 1
          fi

          version="${TAG#v}"
          notes="$(mktemp)"
          trap 'rm -f -- "$notes"' EXIT
          tools/packaging/extract_release_notes.sh "$version" CHANGELOG.md > "$notes"
          gh release create "$TAG" --draft --title "Baud $TAG" --notes-file "$notes"

  linux-packages:
    name: Linux packages
    runs-on: ubuntu-22.04
    needs: prepare-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache target directory
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libvulkan-dev \
            libfontconfig1-dev

      - name: Build release binary
        run: cargo build --release --locked

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build deb
        run: ./tools/packaging/build_deb.sh

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Build rpm
        run: ./tools/packaging/build_rpm.sh

      - name: Build AppImage
        run: ./tools/packaging/build_appimage.sh

      - name: Build binary tarball
        run: ./tools/packaging/build_tarball.sh

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -Eeuo pipefail
          cd dist
          shopt -s nullglob
          assets=(./*.AppImage ./*.deb ./*.rpm ./*.tar.gz)
          if (( ${#assets[@]} == 0 )); then
            echo "Error: no release assets were produced" >&2
            exit 1
          fi
          for asset in "${assets[@]}"; do
            sha256sum -- "${asset#./}"
          done > SHA256SUMS

      - name: Sign update manifest
        env:
          BAUD_UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: ./tools/packaging/sign_update_manifest.sh dist "${{ needs.prepare-release.outputs.tag }}"

      - name: Verify release assets
        run: ./tools/packaging/verify_release_assets.sh dist

      - name: Upload dry-run artifacts
        if: needs.prepare-release.outputs.publish != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: baud-linux-packages
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/update-manifest.json
            dist/update-manifest.sig
          if-no-files-found: error

      - name: Upload release assets to draft
        if: needs.prepare-release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: gh release upload "$TAG" dist/*.AppImage dist/*.deb dist/*.rpm dist/*.tar.gz dist/SHA256SUMS dist/update-manifest.json dist/update-manifest.sig --clobber

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [prepare-release, linux-packages]
    if: needs.prepare-release.outputs.publish == 'true' && needs.linux-packages.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Publish verified draft
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: gh release edit "$TAG" --draft=false --latest
