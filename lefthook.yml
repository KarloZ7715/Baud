# Lefthook config para Baud
# Docs: https://lefthook.dev/configuration/
#
# Comandos utiles:
#   lefthook install         <- instala los hooks en .git/hooks/ (correlo una vez despues de clonar)
#   lefthook run pre-commit  <- corre los hooks manualmente
#   lefthook uninstall       <- desinstala los hooks
#
# Para skipear un hook puntual: git commit --no-verify

pre-commit:
  parallel: true   # corre fmt y clippy en paralelo
  jobs:
    - name: fmt
      glob: "*.rs"
      run: cargo fmt --all -- --check
      stage_fixed: true   # si falla, aplica fmt y agrega al stage

    - name: clippy
      glob: "*.rs"
      run: cargo clippy --all-targets -- -D warnings


pre-push:
  jobs:
    - name: test
      run: cargo test --all

commit-msg:
  commands:
    conventional-commit:
      run: |
        grep -qE '^(feat|fix|chore|docs|style|refactor|perf|test|build|ci)(\(.+\))?: .+' "{1}" \
          || (echo "ERROR: mensaje no sigue Conventional Commits"; exit 1)
